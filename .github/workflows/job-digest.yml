name: AI/ML Job Digest

on:
  workflow_dispatch:
  schedule:
    # Production mode: every 2 hours.
    - cron: "0 */2 * * *"

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: .cache/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run digest
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: patelvraj09876@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: patelvraj09876@gmail.com
          MAIL_FROM: patelvraj09876@gmail.com
          REQUIRE_EMAIL: "1"
          SEEN_JOBS_FILE: .cache/seen_jobs.json
        run: python job_digest_bot.py

      - name: Upload tracker artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-digest-output
          path: outputs/*.xlsx
